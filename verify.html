<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification | Genovate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .content { padding: 40px 30px; }
        .status {
            text-align: center;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .status.valid {
            background: #d4edda;
            border: 2px solid #27ae60;
            color: #155724;
        }
        .status.invalid {
            background: #f8d7da;
            border: 2px solid #e74c3c;
            color: #721c24;
        }
        .status-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .detail-row:last-child { border-bottom: none; }
        .label {
            font-weight: 600;
            color: #6c757d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .value {
            color: #212529;
            font-weight: 500;
            text-align: right;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #6c757d;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🧬</div>
            <h1>GENOVATE CERTIFICATE VERIFICATION</h1>
        </div>
        
        <div class="content" id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Verifying certificate...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 Genovate Biotechnology Club | Amity University</p>
            <p>Secure Certificate Validation System</p>
        </div>
    </div>

    <script>
        // Configuration - AUTO-DETECTS the correct path for GitHub Pages
        const getBaseUrl = () => {
            // Get the current URL path
            const path = window.location.pathname;
            // If we're on GitHub Pages with a repo name (e.g., /repo-name/verify.html)
            // Extract the base path (everything before the last slash)
            const basePath = path.substring(0, path.lastIndexOf('/') + 1);
            return basePath;
        };
        
        // Try multiple possible locations for the JSON file
        const CERTIFICATES_URLS = [
            'certificates.json',                                    // Same directory
            './certificates.json',                                  // Explicit relative
            getBaseUrl() + 'certificates.json',                    // Auto-detected base path
            window.location.origin + getBaseUrl() + 'certificates.json'  // Absolute URL
        ];
        
        // Get certificate ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        
        async function verifyCertificate() {
            const contentDiv = document.getElementById('content');
            
            if (!certId) {
                showInvalid(contentDiv, 'No certificate ID provided');
                return;
            }
            
            let lastError = null;
            
            // Try each possible URL until one works
            for (const url of CERTIFICATES_URLS) {
                try {
                    console.log('Trying to fetch from:', url);
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                        },
                        cache: 'no-cache'
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log('Successfully loaded data:', data);
                    
                    // Handle both formats: {certificates: [...]} or direct array
                    const certificates = data.certificates || data;
                    
                    if (!Array.isArray(certificates)) {
                        throw new Error('Invalid data format: certificates array not found');
                    }
                    
                    // Find certificate
                    const cert = certificates.find(c => c.id === certId.toUpperCase());
                    
                    if (cert) {
                        showValid(contentDiv, cert);
                    } else {
                        showInvalid(contentDiv, 'Certificate ID not found in our database');
                    }
                    return; // Success - exit the function
                    
                } catch (error) {
                    console.warn('Failed to fetch from', url, ':', error.message);
                    lastError = error;
                    // Continue to next URL
                }
            }
            
            // If we get here, all URLs failed
            showError(contentDiv, lastError);
        }
        
        function showValid(container, cert) {
            container.innerHTML = `
                <div class="status valid">
                    <div class="status-icon">✅</div>
                    <h2>Valid Certificate</h2>
                    <p>This certificate is authentic and verified.</p>
                </div>
                
                <div class="details">
                    <div class="detail-row">
                        <span class="label">Certificate ID</span>
                        <span class="value" style="font-family: monospace; font-size: 12px;">${cert.id}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Recipient Name</span>
                        <span class="value">${cert.name}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Email</span>
                        <span class="value">${cert.email}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Institution</span>
                        <span class="value">${cert.institution || 'Amity University'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Category</span>
                        <span class="value">${cert.category}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Issue Date</span>
                        <span class="value">${cert.date}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Verification Hash</span>
                        <span class="value" style="font-family: monospace; font-size: 10px; max-width: 200px; word-break: break-all;">${cert.hash}</span>
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 20px; color: #6c757d; font-size: 14px;">
                    <p>Verified on: ${new Date().toLocaleString()}</p>
                </div>
            `;
        }
        
        function showInvalid(container, message) {
            container.innerHTML = `
                <div class="status invalid">
                    <div class="status-icon">❌</div>
                    <h2>Invalid Certificate</h2>
                    <p>${message}</p>
                    <p style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                        Please check the certificate ID and try again.
                    </p>
                </div>
                
                <div style="text-align: center; margin-top: 30px;">
                    <p style="color: #6c757d; margin-bottom: 15px;">Certificate ID searched:</p>
                    <code style="background: #f8f9fa; padding: 10px 20px; border-radius: 5px; font-size: 16px; color: #e74c3c;">
                        ${certId || 'None provided'}
                    </code>
                </div>
                
                <div style="text-align: center; margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 8px; color: #856404;">
                    <strong>Need help?</strong><br>
                    Contact: genovate.aib@gmail.com
                </div>
            `;
        }
        
        function showError(container, error) {
            container.innerHTML = `
                <div class="status invalid">
                    <div class="status-icon">⚠️</div>
                    <h2>Verification Error</h2>
                    <p>Unable to load certificate database.</p>
                    <p style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                        This might be due to network issues or missing data file.
                    </p>
                </div>
                
                <div class="error-box">
                    <strong>Technical Details:</strong><br>
                    ${error ? error.message : 'Unknown error'}<br><br>
                    <strong>Troubleshooting:</strong>
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        <li>Make sure certificates.json is uploaded to your GitHub repository</li>
                        <li>Check that the file is in the same directory as verify.html</li>
                        <li>Ensure your repository is public (for GitHub Pages)</li>
                        <li>Wait 2-3 minutes after pushing changes for GitHub Pages to update</li>
                    </ul>
                </div>
                
                <div style="text-align: center; margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 8px; color: #856404;">
                    <strong>Need help?</strong><br>
                    Contact: genovate@amity.edu
                </div>
            `;
        }
        
        // Run verification on load
        verifyCertificate();
    </script>
</body>
</html>
