<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genovate Certificate Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container { max-width: 600px; padding: 40px; }
        .logo { 
            width: 280px; 
            height: auto; 
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { font-size: 36px; margin-bottom: 20px; }
        p { font-size: 18px; opacity: 0.9; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #e94560;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .features {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            min-width: 150px;
        }
        .feature-icon { font-size: 30px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.JPG" alt="Genovate Biotechnology Club" class="logo">
        <h1>Certificate Verification</h1>
        <p>Secure verification system for workshop certificates issued by Genovate Biotechnology Club, Amity University Bengaluru.</p>
        <a href="verify.html" class="btn">Verify Certificate</a>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div>Secure</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div>Instant</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✅</div>
                <div>Authentic</div>
            </div>
        </div>
    </div>
</body>
</html>
